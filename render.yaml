services:
  - type: web
    name: samarth-properties-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ADMIN_EXPIRY
        value: 8h
      - key: JWT_CONFIG_EXPIRY
        value: 4h
      - key: ADMIN_PANEL_PATH
        sync: false
      - key: CONFIG_PANEL_PATH
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ADMIN_NOTIFICATION_EMAIL
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: 50
      - key: IMAGE_QUALITY
        value: 85
      - key: THUMBNAIL_WIDTH
        value: 400
      - key: THUMBNAIL_HEIGHT
        value: 300
      - key: LARGE_IMAGE_WIDTH
        value: 1920
      - key: LARGE_IMAGE_HEIGHT
        value: 1080
      - key: WEBP_QUALITY
        value: 80
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: LOGIN_RATE_LIMIT_MAX
        value: 5
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: WHATSAPP_NUMBER
        value: 919373076213
