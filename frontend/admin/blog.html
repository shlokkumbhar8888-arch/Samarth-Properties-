<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Posts — Samarth Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body class="adm-body">

  <div class="adm-layout">
    <aside class="adm-sidebar" id="adm-sidebar"></aside>
    <div class="adm-sidebar-overlay" id="adm-sidebar-overlay"></div>

    <div class="adm-main">
      <header class="adm-header" id="adm-header"></header>

      <main class="adm-content">

        <div class="adm-page-header">
          <div>
            <h1 class="adm-page-title">Blog Posts</h1>
            <p class="adm-page-sub" id="blog-count">Loading…</p>
          </div>
          <a href="blog-form.html" class="adm-btn adm-btn--primary">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Post
          </a>
        </div>

        <div class="adm-panel" style="margin-bottom:20px;">
          <div class="adm-panel__body" style="padding:16px 24px;">
            <div class="adm-controls">
              <div class="adm-search-wrap">
                <svg class="adm-search-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="search" class="adm-search-input" id="blog-search" placeholder="Search posts…" autocomplete="off">
              </div>
              <select class="adm-select" id="blog-status-filter">
                <option value="">All status</option>
                <option value="published">Published</option>
                <option value="draft">Draft</option>
              </select>
              <select class="adm-select" id="blog-sort">
                <option value="created_at:desc">Newest first</option>
                <option value="published_at:desc">Published date</option>
                <option value="title:asc">Title A–Z</option>
              </select>
              <button class="adm-btn adm-btn--ghost adm-btn--sm" id="blog-reset" style="display:none;">Reset</button>
              <span class="adm-results-count" id="blog-results-count"></span>
            </div>
          </div>
        </div>

        <div class="adm-panel">
          <div class="adm-table-wrap">
            <table class="adm-table">
              <thead>
                <tr>
                  <th style="width:56px;">Cover</th>
                  <th>Title</th>
                  <th>Category</th>
                  <th>Author</th>
                  <th>Status</th>
                  <th>Featured</th>
                  <th>Published</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="blog-tbody"></tbody>
            </table>
          </div>
          <div id="blog-pagination"></div>
        </div>

      </main>
    </div>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="assets/js/admin-core.js"></script>
  <script src="assets/js/admin-translate.js"></script>
  <script src="assets/js/blog-admin.js"></script>
</body>
</html>
