<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enquiries — Samarth Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body class="adm-body">

  <div class="adm-layout">
    <aside class="adm-sidebar" id="adm-sidebar"></aside>
    <div class="adm-sidebar-overlay" id="adm-sidebar-overlay"></div>

    <div class="adm-main">
      <header class="adm-header" id="adm-header"></header>

      <main class="adm-content">

        <div class="adm-page-header">
          <div>
            <h1 class="adm-page-title">Enquiries</h1>
            <p class="adm-page-sub" id="enq-count">Loading…</p>
          </div>
          <button class="adm-btn adm-btn--secondary" id="enq-export-btn">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export CSV
          </button>
        </div>

        <!-- Filters -->
        <div class="adm-panel" style="margin-bottom:20px;">
          <div class="adm-panel__body" style="padding:16px 24px;">
            <div class="adm-controls">
              <div class="adm-search-wrap">
                <svg class="adm-search-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="search" class="adm-search-input" id="enq-search" placeholder="Search by name or phone…" autocomplete="off">
              </div>
              <select class="adm-select" id="enq-status">
                <option value="">All status</option>
                <option value="open">Open</option>
                <option value="read">Read</option>
                <option value="responded">Responded</option>
                <option value="closed">Closed</option>
              </select>
              <select class="adm-select" id="enq-sort">
                <option value="created_at:desc">Newest first</option>
                <option value="created_at:asc">Oldest first</option>
              </select>
              <button class="adm-btn adm-btn--ghost adm-btn--sm" id="enq-reset" style="display:none;">Reset</button>
              <span class="adm-results-count" id="enq-results-count"></span>
            </div>
          </div>
        </div>

        <!-- Table -->
        <div class="adm-panel">
          <div class="adm-table-wrap">
            <table class="adm-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Phone</th>
                  <th>Email</th>
                  <th>Message</th>
                  <th>Source</th>
                  <th>Status</th>
                  <th>Received</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="enq-tbody"></tbody>
            </table>
          </div>
          <div id="enq-pagination"></div>
        </div>

      </main>
    </div>
  </div>

  <!-- Detail drawer -->
  <div class="adm-drawer-backdrop" id="enq-drawer-backdrop"></div>
  <div class="adm-drawer" id="enq-drawer" role="dialog" aria-modal="true" aria-labelledby="enq-drawer-title">
    <div class="adm-drawer__header">
      <h2 class="adm-drawer__title" id="enq-drawer-title">Enquiry Details</h2>
      <button class="adm-drawer__close" id="enq-drawer-close" aria-label="Close">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="adm-drawer__body" id="enq-drawer-body"></div>
    <div class="adm-drawer__footer">
      <select class="adm-select" id="enq-status-change" style="height:36px;">
        <option value="open">Open</option>
        <option value="read">Read</option>
        <option value="responded">Responded</option>
        <option value="closed">Closed</option>
      </select>
      <button class="adm-btn adm-btn--primary" id="enq-save-status">Update Status</button>
      <button class="adm-btn adm-btn--secondary" id="enq-drawer-cancel">Close</button>
    </div>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="assets/js/admin-core.js"></script>
  <script src="assets/js/admin-translate.js"></script>
  <script src="assets/js/enquiries-admin.js"></script>
</body>
</html>
