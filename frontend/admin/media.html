<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Library — Samarth Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
  <link rel="stylesheet" href="assets/css/admin.css">
  <style>
    /* ── Media Library extras ───────────────────────────── */
    .ml-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .ml-filter-pills {
      display: flex;
      gap: 6px;
    }
    .ml-pill {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--adm-border);
      background: transparent;
      color: var(--adm-text-muted);
      transition: all .18s;
    }
    .ml-pill.active {
      background: var(--adm-gold);
      color: var(--adm-navy);
      border-color: var(--adm-gold);
    }
    .ml-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      padding: 20px;
    }
    .ml-card {
      background: var(--adm-card);
      border: 1px solid var(--adm-border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow .2s, transform .2s;
      position: relative;
    }
    .ml-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.25); transform: translateY(-2px); }
    .ml-card__thumb {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: rgba(255,255,255,.04);
    }
    .ml-card__placeholder {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,.04);
      font-size: 2rem;
    }
    .ml-card__info {
      padding: 10px 12px;
    }
    .ml-card__name {
      font-size: .75rem;
      font-weight: 500;
      color: var(--adm-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .ml-card__meta {
      font-size: .7rem;
      color: var(--adm-text-muted);
    }
    .ml-card__type-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: .65rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .ml-card__type-badge--image { background: rgba(34,197,94,.15); color: #4ade80; }
    .ml-card__type-badge--pdf   { background: rgba(239,68,68,.15); color: #f87171; }
    .ml-card__type-badge--video { background: rgba(168,85,247,.15); color: #c084fc; }
    .ml-card__actions {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      opacity: 0;
      transition: opacity .18s;
    }
    .ml-card:hover .ml-card__actions { opacity: 1; }
    .ml-card__action-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: rgba(10,22,40,.85);
      border: 1px solid rgba(255,255,255,.15);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .15s;
    }
    .ml-card__action-btn:hover { background: var(--adm-gold); color: var(--adm-navy); }
    .ml-card__action-btn.danger:hover { background: #ef4444; color: #fff; }

    /* ── Upload zone ─────────────────────────────────────── */
    .ml-dropzone {
      border: 2px dashed var(--adm-border);
      border-radius: 12px;
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      margin: 0 20px 0;
    }
    .ml-dropzone.dragging,
    .ml-dropzone:hover { border-color: var(--adm-gold); background: rgba(201,169,110,.05); }
    .ml-dropzone__icon { font-size: 2.5rem; margin-bottom: 12px; }
    .ml-dropzone__title { font-size: 1rem; font-weight: 600; color: var(--adm-text); margin-bottom: 4px; }
    .ml-dropzone__sub { font-size: .82rem; color: var(--adm-text-muted); }
    .ml-dropzone__btn { margin-top: 16px; }

    /* ── Upload progress ─────────────────────────────────── */
    .ml-progress-list { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }
    .ml-progress-item {
      background: var(--adm-card);
      border: 1px solid var(--adm-border);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ml-progress-item__name { flex: 1; font-size: .82rem; color: var(--adm-text); }
    .ml-progress-item__bar-wrap { flex: 2; height: 4px; background: rgba(255,255,255,.1); border-radius: 4px; overflow: hidden; }
    .ml-progress-item__bar { height: 100%; background: var(--adm-gold); border-radius: 4px; transition: width .2s; }
    .ml-progress-item__status { font-size: .75rem; color: var(--adm-text-muted); min-width: 48px; text-align: right; }
    .ml-progress-item__status.done { color: #4ade80; }
    .ml-progress-item__status.error { color: #f87171; }

    /* ── Edit drawer ─────────────────────────────────────── */
    .ml-preview-img {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 8px;
      background: rgba(255,255,255,.04);
      margin-bottom: 16px;
    }
    .ml-url-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }
    .ml-url-input {
      flex: 1;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--adm-border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: .78rem;
      color: var(--adm-text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ml-load-more {
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .ml-empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--adm-text-muted);
    }
    .ml-empty__icon { font-size: 2.5rem; margin-bottom: 12px; }
    .ml-empty__title { font-size: 1rem; font-weight: 600; color: var(--adm-text); margin-bottom: 6px; }
  </style>
</head>
<body class="adm-body">

  <div class="adm-layout">
    <aside class="adm-sidebar" id="adm-sidebar"></aside>
    <div class="adm-sidebar-overlay" id="adm-sidebar-overlay"></div>

    <div class="adm-main">
      <header class="adm-header" id="adm-header"></header>

      <main class="adm-content">

        <!-- Page header -->
        <div class="adm-page-header">
          <div>
            <h1 class="adm-page-title">Media Library</h1>
            <p class="adm-page-sub" id="ml-count">Loading…</p>
          </div>
          <button class="adm-btn adm-btn--primary" id="ml-upload-toggle">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Upload Files
          </button>
        </div>

        <!-- Upload zone (collapsible) -->
        <div id="ml-upload-section" style="display:none; margin-bottom:16px;">
          <div class="adm-panel" style="margin-bottom:12px;">
            <div class="adm-panel__header" style="padding:14px 20px 0;">
              <span style="font-weight:600;">Upload New Files</span>
            </div>
            <div class="adm-panel__body" style="padding:16px 20px;">
              <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;">
                <div class="adm-field" style="flex:1;min-width:160px;">
                  <label class="adm-label">Folder / Category</label>
                  <select class="adm-select" id="ml-folder">
                    <option value="general">General</option>
                    <option value="projects">Projects</option>
                    <option value="blog">Blog</option>
                    <option value="team">Team</option>
                    <option value="testimonials">Testimonials</option>
                  </select>
                </div>
                <div class="adm-field" style="flex:2;min-width:200px;">
                  <label class="adm-label">Alt Text (optional)</label>
                  <input type="text" id="ml-alt-text" class="adm-input" placeholder="Describe the image for accessibility">
                </div>
              </div>
            </div>
          </div>
          <div class="ml-dropzone" id="ml-dropzone">
            <div class="ml-dropzone__icon">📁</div>
            <p class="ml-dropzone__title">Drag & drop files here</p>
            <p class="ml-dropzone__sub">Supports JPG, PNG, WebP, GIF, PDF, MP4 · Max 10 MB per file</p>
            <button class="adm-btn adm-btn--secondary adm-btn--sm ml-dropzone__btn" id="ml-browse-btn">Browse Files</button>
            <input type="file" id="ml-file-input" multiple accept="image/*,application/pdf,video/mp4,video/webm" style="display:none;">
          </div>
          <div class="ml-progress-list" id="ml-progress-list" style="margin-top:12px;display:none;"></div>
        </div>

        <!-- Filters -->
        <div class="adm-panel" style="margin-bottom:16px;">
          <div class="adm-panel__body" style="padding:14px 20px;">
            <div class="adm-controls">
              <div class="ml-filter-pills" id="ml-type-filter">
                <button class="ml-pill active" data-type="">All</button>
                <button class="ml-pill" data-type="image">Images</button>
                <button class="ml-pill" data-type="pdf">Documents</button>
                <button class="ml-pill" data-type="video">Videos</button>
              </div>
              <div class="adm-search-wrap">
                <svg class="adm-search-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="search" class="adm-search-input" id="ml-search" placeholder="Search by filename…" autocomplete="off">
              </div>
              <select class="adm-select" id="ml-folder-filter">
                <option value="">All folders</option>
                <option value="general">General</option>
                <option value="projects">Projects</option>
                <option value="blog">Blog</option>
                <option value="team">Team</option>
                <option value="testimonials">Testimonials</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Media grid -->
        <div class="adm-panel" style="min-height:300px;">
          <div class="ml-grid" id="ml-grid"></div>
          <div class="ml-load-more" id="ml-load-more" style="display:none;">
            <button class="adm-btn adm-btn--secondary" id="ml-load-more-btn">Load More</button>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Edit/Detail Drawer -->
  <div class="adm-drawer-backdrop" id="ml-drawer-backdrop"></div>
  <div class="adm-drawer" id="ml-drawer" role="dialog" aria-modal="true" aria-labelledby="ml-drawer-title">
    <div class="adm-drawer__header">
      <h2 class="adm-drawer__title" id="ml-drawer-title">File Details</h2>
      <button class="adm-drawer__close" id="ml-drawer-close" aria-label="Close">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="adm-drawer__body" id="ml-drawer-body"></div>
    <div class="adm-drawer__footer">
      <button class="adm-btn adm-btn--primary" id="ml-save-alt">Save Alt Text</button>
      <button class="adm-btn adm-btn--danger" id="ml-delete-btn">Delete File</button>
    </div>
  </div>

  <!-- Delete confirm dialog -->
  <div class="adm-drawer-backdrop" id="ml-confirm-backdrop" style="display:none;z-index:1100;"></div>
  <div id="ml-confirm-dialog" style="display:none;position:fixed;z-index:1110;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--adm-card);border:1px solid var(--adm-border);border-radius:12px;padding:28px 32px;min-width:300px;max-width:420px;box-shadow:0 16px 48px rgba(0,0,0,.5);">
    <h3 style="margin:0 0 8px;font-size:1rem;">Delete File?</h3>
    <p style="margin:0 0 20px;font-size:.85rem;color:var(--adm-text-muted);">This will permanently remove the file from storage. This action cannot be undone.</p>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="adm-btn adm-btn--secondary" id="ml-confirm-cancel">Cancel</button>
      <button class="adm-btn adm-btn--danger" id="ml-confirm-delete">Yes, Delete</button>
    </div>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="assets/js/admin-core.js"></script>
  <script src="assets/js/admin-translate.js"></script>
  <script src="assets/js/media-admin.js"></script>
</body>
</html>
